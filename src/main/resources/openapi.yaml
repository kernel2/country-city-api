openapi: 3.0.3
info:
  title: Country City API
  version: 1.0.0
  description: In-memory REST API for managing countries and cities with pagination support.

servers:
  - url: http://localhost:8080

tags:
  - name: Countries
  - name: Cities

paths:
  /countries:
    get:
      tags:
        - Countries
      summary: List all countries
      operationId: getCountries
      responses:
        '200':
          description: Countries retrieved successfully
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/CountryResponse'
        '500':
          $ref: '#/components/responses/InternalServerError'
    post:
      tags:
        - Countries
      summary: Create a country
      operationId: createCountry
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CountryCreateRequest'
      responses:
        '201':
          description: Country created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CountryResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /countries/{countryId}/cities:
    get:
      tags:
        - Cities
      summary: List cities by country (paginated)
      operationId: getCitiesByCountryId
      parameters:
        - $ref: '#/components/parameters/CountryIdPathParam'
        - $ref: '#/components/parameters/PageQueryParam'
        - $ref: '#/components/parameters/SizeQueryParam'
      responses:
        '200':
          description: Paginated city list retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PagedCitySummaryResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /cities:
    post:
      tags:
        - Cities
      summary: Create a city
      operationId: createCity
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CityCreateRequest'
      responses:
        '201':
          description: City created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CityDetailsResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /cities/{cityId}:
    get:
      tags:
        - Cities
      summary: Get city details by id
      operationId: getCityById
      parameters:
        - $ref: '#/components/parameters/CityIdPathParam'
      responses:
        '200':
          description: City details retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CityDetailsResponse'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

components:
  parameters:
    CountryIdPathParam:
      name: countryId
      in: path
      required: true
      description: Unique country identifier
      schema:
        type: integer
        format: int64
        minimum: 1
      example: 1
    CityIdPathParam:
      name: cityId
      in: path
      required: true
      description: Unique city identifier
      schema:
        type: integer
        format: int64
        minimum: 1
      example: 1
    PageQueryParam:
      name: page
      in: query
      required: false
      description: Zero-based page index
      schema:
        type: integer
        format: int32
        minimum: 0
        default: 0
    SizeQueryParam:
      name: size
      in: query
      required: false
      description: Page size
      schema:
        type: integer
        format: int32
        minimum: 1
        default: 10

  responses:
    BadRequest:
      description: Invalid request parameters
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    InternalServerError:
      description: Unexpected server error
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'

  schemas:
    CountryCreateRequest:
      type: object
      required:
        - name
      properties:
        name:
          type: string
          minLength: 1
          example: Portugal
    CityCreateRequest:
      type: object
      required:
        - name
        - countryId
        - population
        - zipCode
        - description
      properties:
        name:
          type: string
          minLength: 1
          example: Porto
        countryId:
          type: integer
          format: int64
          minimum: 1
          example: 5
        population:
          type: integer
          format: int64
          minimum: 0
          example: 237591
        zipCode:
          type: string
          minLength: 1
          example: 4000-001
        description:
          type: string
          minLength: 1
          example: Coastal city in northern Portugal.
    CountryResponse:
      type: object
      required:
        - id
        - name
      properties:
        id:
          type: integer
          format: int64
          example: 1
        name:
          type: string
          example: France
    CitySummaryResponse:
      type: object
      required:
        - id
        - name
        - countryId
      properties:
        id:
          type: integer
          format: int64
          example: 1
        name:
          type: string
          example: Paris
        countryId:
          type: integer
          format: int64
          example: 1
    CityDetailsResponse:
      type: object
      required:
        - id
        - name
        - countryId
      properties:
        id:
          type: integer
          format: int64
          example: 1
        name:
          type: string
          example: Paris
        countryId:
          type: integer
          format: int64
          example: 1
        population:
          type: integer
          format: int64
          nullable: true
          example: 2148000
        zipCode:
          type: string
          nullable: true
          example: 75000
        description:
          type: string
          nullable: true
          example: Capital city of France
    PagedCitySummaryResponse:
      type: object
      required:
        - content
        - page
        - size
        - totalElements
        - totalPages
        - last
      properties:
        content:
          type: array
          items:
            $ref: '#/components/schemas/CitySummaryResponse'
        page:
          type: integer
          format: int32
          example: 0
        size:
          type: integer
          format: int32
          example: 10
        totalElements:
          type: integer
          format: int64
          example: 6
        totalPages:
          type: integer
          format: int32
          example: 1
        last:
          type: boolean
          example: true
    ErrorResponse:
      type: object
      required:
        - timestamp
        - status
        - error
        - message
        - path
      properties:
        timestamp:
          type: string
          format: date-time
        status:
          type: integer
          format: int32
          example: 404
        error:
          type: string
          example: Not Found
        message:
          type: string
          example: "City not found with id: 99999"
        path:
          type: string
          example: /cities/99999

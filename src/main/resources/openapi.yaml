openapi: 3.0.3
info:
  title: Country City API
  version: 0.1.0
  description: OpenAPI-first contract draft for country and city lookup.

servers:
  - url: /api

tags:
  - name: Countries
  - name: Cities

paths:
  /countries:
    get:
      tags:
        - Countries
      summary: List all countries
      operationId: getCountries
      responses:
        '200':
          description: Country list retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CountryListResponse'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /countries/{countryId}/cities:
    get:
      tags:
        - Cities
      summary: List cities by country (paginated)
      operationId: getCitiesByCountry
      parameters:
        - $ref: '#/components/parameters/CountryIdPathParam'
        - $ref: '#/components/parameters/PageQueryParam'
        - $ref: '#/components/parameters/SizeQueryParam'
      responses:
        '200':
          description: Paginated city list retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedCityListResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          description: Country not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /cities/{cityId}:
    get:
      tags:
        - Cities
      summary: Get city details by id
      operationId: getCityById
      parameters:
        - $ref: '#/components/parameters/CityIdPathParam'
      responses:
        '200':
          description: City details retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CityDetailsResponse'
        '404':
          description: City not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          $ref: '#/components/responses/InternalServerError'

components:
  parameters:
    CountryIdPathParam:
      name: countryId
      in: path
      required: true
      description: Unique country identifier
      schema:
        type: string
        minLength: 1
      example: FR

    CityIdPathParam:
      name: cityId
      in: path
      required: true
      description: Unique city identifier
      schema:
        type: integer
        format: int64
        minimum: 1
      example: 1001

    PageQueryParam:
      name: page
      in: query
      required: false
      description: Zero-based page index
      schema:
        type: integer
        format: int32
        minimum: 0
        default: 0

    SizeQueryParam:
      name: size
      in: query
      required: false
      description: Page size
      schema:
        type: integer
        format: int32
        minimum: 1
        maximum: 100
        default: 20

  responses:
    BadRequest:
      description: Invalid request parameters
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'

    InternalServerError:
      description: Unexpected server error
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'

  schemas:
    CountryListResponse:
      type: object
      required:
        - countries
      properties:
        countries:
          type: array
          items:
            $ref: '#/components/schemas/CountrySummary'

    CountrySummary:
      type: object
      required:
        - id
        - name
        - isoCode
      properties:
        id:
          type: string
          example: FR
        name:
          type: string
          example: France
        isoCode:
          type: string
          minLength: 2
          maxLength: 2
          example: FR

    PaginatedCityListResponse:
      type: object
      required:
        - content
        - page
        - size
        - totalElements
        - totalPages
        - last
      properties:
        content:
          type: array
          items:
            $ref: '#/components/schemas/CitySummary'
        page:
          type: integer
          format: int32
          minimum: 0
          example: 0
        size:
          type: integer
          format: int32
          minimum: 1
          example: 20
        totalElements:
          type: integer
          format: int64
          minimum: 0
          example: 125
        totalPages:
          type: integer
          format: int32
          minimum: 0
          example: 7
        last:
          type: boolean
          example: false

    CitySummary:
      type: object
      required:
        - id
        - name
        - countryId
      properties:
        id:
          type: integer
          format: int64
          example: 1001
        name:
          type: string
          example: Paris
        countryId:
          type: string
          example: FR

    CityDetailsResponse:
      type: object
      required:
        - id
        - name
        - country
      properties:
        id:
          type: integer
          format: int64
          example: 1001
        name:
          type: string
          example: Paris
        country:
          $ref: '#/components/schemas/CountrySummary'
        population:
          type: integer
          format: int64
          minimum: 0
          nullable: true
          example: 2148000
        latitude:
          type: number
          format: double
          nullable: true
          example: 48.8566
        longitude:
          type: number
          format: double
          nullable: true
          example: 2.3522

    ErrorResponse:
      type: object
      required:
        - timestamp
        - status
        - error
        - message
        - path
      properties:
        timestamp:
          type: string
          format: date-time
          example: '2026-04-27T15:50:00Z'
        status:
          type: integer
          format: int32
          example: 404
        error:
          type: string
          example: Not Found
        message:
          type: string
          example: City not found
        path:
          type: string
          example: /api/cities/9999
        traceId:
          type: string
          nullable: true
          example: 6f1b9d4c3e8a7f21
